<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunha Page</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: #f4f4f4;
        font-family: Arial, sans-serif;
        overflow: hidden;
    }

    /* 절벽 GIF 영역 */
    .cliff-container {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 20px;
        height: 260px;
    }

    .hanging-icon {
        width: 200px;
        animation: swing 2s ease-in-out infinite alternate;
        transform-origin: top center;
        position: relative;
    }

    @keyframes swing {
        0% { transform: rotate(-8deg); }
        100% { transform: rotate(8deg); }
    }

    /* 폭탄 팝업 */
    .bomb {
        position: fixed;
        width: 250px;
        display: none;
        z-index: 9999;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
    }

    /* 입력창 */
    .input-box {
        text-align: center;
    }

    input {
        padding: 10px;
        width: 260px;
        font-size: 16px;
        border-radius: 8px;
        border: 1px solid #999;
        margin-top: 10px;
    }

    .result, .total-score {
        margin-top: 15px;
        font-size: 20px;
        font-weight: bold;
    }

    /* ✅ 세로 단일 그래프 영역 */
    .chart-box {
        position: fixed;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
        width: 120px;
        height: 400px;
        background: white;
        border: 1px solid #aaa;
        padding: 10px;
        border-radius: 10px;
    }

    .y-axis {
        font-size: 12px;
        color: #444;
        margin-bottom: 10px;
    }

    .graph-frame {
        height: 300px;
        width: 60px;
        border: 1px solid #aaa;
        margin: 0 auto;
        position: relative;
        background: #fcecec;
        display: flex;
        align-items: flex-end;
    }

    /* ✅ 세로 막대 (하나만 존재) */
    #bar {
        width: 100%;
        background: #ff4d4d;
        height: 0;
        transition: height 0.5s ease;
    }
</style>
</head>
<body>

<!-- ✅ 절벽 GIF -->
<div class="cliff-container">
    <img class="hanging-icon" id="cliffGif"
         src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExcWl2aHJ5NWEyYXM2Yjd3ZXFld3FmczF3MDVubGpjY29haWJ4NmkyeCZlcD12MV9naWZzX3NlYXJjaCZjdD1n/lehsxJpCEmZlrqtwUj/giphy.gif">
</div>

<!-- ✅ 폭발 GIF -->
<img class="bomb" id="bombGif"
     src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExMHhhdXBqcnRxaGZpajMyaDN0cmY3ZXc4bng5MjZzbHBkZHEwYzJsOCZlcD12MV9naWZzX3NlYXJjaCZjdD1n/XUFPGrX5Zis6Y/giphy.gif">

<!-- ✅ 입력 UI -->
<div class="input-box">
    <div style="font-size: 22px; margin-bottom: 10px;">선누에게 뭐라고 말했습니까?</div>
    <input type="text" id="userInput" placeholder="입력해주세요">
    <div class="result" id="resultText"></div>
    <div class="total-score" id="totalScoreText">누적 벌점: 0점</div>
</div>

<!-- ✅ 세로 그래프 -->
<div class="chart-box">
    <div class="y-axis">
        0<br>
        -10만<br>
        -20만<br>
        -30만<br>
        -40만<br>
        -50만<br>
        -60만<br>
        -70만<br>
        -80만<br>
        -90만<br>
        -100만
    </div>
    <div class="graph-frame">
        <div id="bar"></div>
    </div>
</div>


<script>
/* ✅ 과거 벌점 불러오기 */
let totalScore = Number(localStorage.getItem("sunhuScore")) || 0;

const result = document.getElementById("resultText");
const scoreDisplay = document.getElementById("totalScoreText");
const bar = document.getElementById("bar");
const cliffGif = document.getElementById("cliffGif");
const bombGif = document.getElementById("bombGif");

/* ✅ 초기 상태 로드 */
scoreDisplay.textContent = `누적 벌점: ${totalScore}점`;
updateGraph();

/* ✅ 입력 처리 */
document.getElementById("userInput").addEventListener("input", () => {
    const text = document.getElementById("userInput").value.trim();

    let penalty = 0;

    /* ✅ 공란이면 아무것도 출력 안함 */
    if (text === "") {
        result.textContent = "";
        return;
    }

    /* ✅ 조건 우선순위 */
    if (text.includes("뭐요") || text.includes("뭐가요")) {
        penalty = -100000;
        result.textContent = "벌점 -10만점입니다";
        result.style.color = "red";
    }
    else if (text.includes("ㅋ")) {
        penalty = -50000;
        result.textContent = "벌점 -5만점입니다";
        result.style.color = "red";
    }
    else {
        result.textContent = "404 ERROR: 선누가 마상을 입었으니 벌점 측정 불가";
        result.style.color = "black";
        return;
    }

    /* ✅ 누적 처리 + 저장 */
    totalScore += penalty;
    localStorage.setItem("sunhuScore", totalScore);

    scoreDisplay.textContent = `누적 벌점: ${totalScore}점`;

    /* ✅ 그래프 업데이트 */
    updateGraph();

    /* ✅ -100만 이하 → 폭발 */
    if (totalScore <= -1000000) {
        triggerExplosion();
    }
});


/* ✅ 세로 막대 업데이트 (1칸=10만) */
function updateGraph() {
    let bars = Math.abs(totalScore / 100000);
    let heightPercent = Math.min(bars * 10, 100);  // 10칸 = 100%

    bar.style.height = heightPercent + "%";
}


/* ✅ 폭발 기능 */
function triggerExplosion() {
    cliffGif.style.display = "none";     // 캐릭터 숨김
    bombGif.style.display = "block";     // 폭발 GIF 표시
}
</script>

</body>
</html>
