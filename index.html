<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sunha Page</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: #f4f4f4;
        font-family: Arial, sans-serif;
    }

    .cliff-container {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 40px;
        height: 250px;
        width: 250px;
        position: relative;
    }

    .hanging-icon {
        width: 140px;
        animation: swing 2s ease-in-out infinite alternate;
        transform-origin: top center;
    }

    @keyframes swing {
        0% { transform: rotate(-10deg); }
        100% { transform: rotate(10deg); }
    }

    .input-box {
        text-align: center;
    }

    input {
        padding: 10px;
        width: 250px;
        font-size: 16px;
        border-radius: 8px;
        border: 1px solid #999;
        margin-top: 10px;
    }

    .result {
        margin-top: 20px;
        font-size: 20px;
        font-weight: bold;
    }
</style>
</head>
<body>

<div class="cliff-container">
    <!-- ✅ 절벽에서 매달린 사람 아이콘 -->
    https://cdn-icons-png.flaticon.com/512/854/854929.png
</div>

<div class="input-box">
    <div style="font-size: 22px; margin-bottom: 10px;">
        선누에게 뭐라고 말했습니까?
    </div>
    <input type="text" id="userInput" placeholder="입력해주세요" oninput="checkInput()" />
