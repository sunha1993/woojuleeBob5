<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunha Page</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: #f4f4f4;
        font-family: Arial, sans-serif;
        overflow: hidden;
    }

    /* 절벽 GIF */
    .cliff-container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 260px;
        margin-bottom: 20px;
    }
    #cliffGif {
        width: 220px;
        animation: swing 2s ease-in-out infinite alternate;
        transform-origin: top center;
    }

    @keyframes swing {
        0% { transform: rotate(-8deg); }
        100% { transform: rotate(8deg); }
    }

    /* 폭탄 GIF */
    #bombGif {
        position: fixed;
        width: 450px;
        display: none;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 9999;
    }

    /* 입력 UI */
    .input-box {
        text-align: center;
    }
    input {
        padding: 10px;
        width: 260px;
        margin-top: 10px;
        border-radius: 8px;
        border: 1px solid #999;
        font-size: 16px;
    }
    .result, .total-score {
        font-size: 20px;
        font-weight: bold;
        margin-top: 15px;
    }

    /* 그래프 컨테이너 */
    .chart-container {
        position: fixed;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
        display: flex;
        gap: 10px;
    }

    /* ✅ 눈금은 정상 방향으로 위→아래 */
    .y-axis {
        height: 300px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        text-align: right;
        padding-right: 5px;
        font-size: 14px;
        color: #444;
    }

    /* ✅ 막대는 아래에서 시작 (flex-end) */
    .graph-frame {
        width: 70px;
        height: 300px;
        border: 1px solid #aaa;
        background: #ffe5e5;
        display: flex;
        align-items: flex-end;
    }

    #bar {
        width: 100%;
        height: 0%;
        background: #ff4d4d;
        transition: height 0.5s ease;
    }

    /* 살려주세요 버튼 */
    #helpBtn {
        margin-top: 20px;
        padding: 10px 20px;
        background: #ff5555;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
    }

    #pwInput {
        display: none;
        margin-top: 10px;
        padding: 8px;
        border-radius: 6px;
        border: 1px solid #666;
    }

    /* ✅ PASSWORD 실패/성공 메시지용 */
    #pwMessage {
        margin-top: 10px;
        font-size: 18px;
        font-weight: bold;
        color: black;
    }
</style>
</head>
<body>

<!-- ✅ 절벽 GIF -->
<div class="cliff-container">
    <img id="cliffGif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExcWl2aHJ5NWEyYXM2Yjd3ZXFld3FmczF3MDVubGpjY29haWJ4NmkyeCZlcD12MV9naWZzX3NlYXJjaCZjdD1n/lehsxJpCEmZlrqtwUj/giphy.gif">
</div>

<!-- ✅ 폭탄 GIF -->
<img id="bombGif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExMHhhdXBqcnRxaGZpajMyaDN0cmY3ZXc4bng5MjZzbHBkZHEwYzJsOCZlcD12MV9naWZzX3NlYXJjaCZjdD1n/XUFPGrX5Zis6Y/giphy.gif">

<!-- ✅ 입력 영역 -->
<div class="input-box">
    <div style="font-size: 22px; margin-bottom: 10px;">선누에게 뭐라고 말했습니까?</div>
    <input type="text" id="userInput" placeholder="입력해주세요">
    <div class="result" id="resultText"></div>
    <div class="total-score" id="totalScoreText">누적 벌점: 0점</div>
</div>

<!-- ✅ 세로 그래프 (0 → 100만 정상 표시) -->
<div class="chart-container">
    <div class="y-axis">
        <div>100만</div>
        <div>90만</div>
        <div>80만</div>
        <div>70만</div>
        <div>60만</div>
        <div>50만</div>
        <div>40만</div>
        <div>30만</div>
        <div>20만</div>
        <div>10만</div>
        <div>0</div>
    </div>

    <div class="graph-frame">
        <div id="bar"></div>
    </div>
</div>

<!-- ✅ 살려주세요 버튼 & 패스워드 입력창 -->
<button id="helpBtn">살려주세요</button>
<input id="pwInput" type="text" placeholder="PASSWORD">

<!-- ✅ PASSWORD 성공/실패 메시지 -->
<div id="pwMessage"></div>

<script>
let totalScore = Number(localStorage.getItem("sunhuScore")) || 0;

const userInput   = document.getElementById("userInput");
const result      = document.getElementById("resultText");
const scoreDisplay= document.getElementById("totalScoreText");
const bar         = document.getElementById("bar");
const cliffGif    = document.getElementById("cliffGif");
const bombGif     = document.getElementById("bombGif");
const helpBtn     = document.getElementById("helpBtn");
const pwInput     = document.getElementById("pwInput");
const pwMessage   = document.getElementById("pwMessage");

/* ✅ 초기값 반영 */
scoreDisplay.textContent = `누적 벌점: ${totalScore}점`;
updateGraph();

/* ✅ 입력 처리 */
userInput.addEventListener("input", () => {
    const text = userInput.value.trim();
    if (text === "") { result.textContent = ""; return; }

    let penalty = 0;

    if (text.includes("뭐요") || text.includes("뭐가요")) {
        penalty = -100000;
        result.textContent = "벌점 -10만점입니다";
        result.style.color = "red";
    } else if (text.includes("ㅋ")) {
        penalty = -50000;
        result.textContent = "벌점 -5만점입니다";
        result.style.color = "red";
    } else {
        result.textContent = "404 ERROR: 선누가 마상을 입었으니 벌점 측정 불가";
        result.style.color = "black";
        return;
    }

    totalScore += penalty;
    localStorage.setItem("sunhuScore", totalScore);

    scoreDisplay.textContent = `누적 벌점: ${totalScore}점`;
    updateGraph();

    if (totalScore <= -1000000) triggerExplosion();
});

/* ✅ 절대값 기반 위로 성장 그래프 */
function updateGraph() {
    const absScore = Math.min(Math.abs(totalScore), 1000000);
    const percent = absScore / 1000000 * 100;
    bar.style.height = percent + "%";
}

/* ✅ 폭발 */
function triggerExplosion() {
    cliffGif.style.display = "none";
    bombGif.style.display = "block";
}

/* ✅ 살려주세요 → PASSWORD 입력창 */
helpBtn.addEventListener("click", () => {
    helpBtn.style.display = "none";
    pwInput.style.display = "block";
    pwInput.focus();
});

/* ✅ PASSWORD 입력 */
pwInput.addEventListener("keypress", (e) => {
    if (e.key === "Enter") {

        if (pwInput.value === "bonasona") {
            totalScore = 0;
            localStorage.setItem("sunhuScore", 0);
            updateGraph();
            scoreDisplay.textContent = "누적 벌점: 0점";
            pwMessage.textContent = "초기화 완료!";
            bombGif.style.display = "none";
            cliffGif.style.display = "block";
        } else {
            pwMessage.textContent = "한턱 쏘세요";
        }

        pwInput.value = "";
    }
});

/* ✅ 포커스 벗어나면 자동 복귀 + 메시지 사라짐 */
pwInput.addEventListener("blur", () => {
    pwInput.style.display = "none";
    helpBtn.style.display = "block";
    pwMessage.textContent = "";   // ✅ ← 한턱쏘세요/초기화완료 둘 다 사라지게
});

</script>

</body>
</html>
