<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sunha Page</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: #f4f4f4;
        font-family: Arial, sans-serif;
    }

    .cliff-container {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 40px;
        height: 250px;
        width: 250px;
    }

    /* ✅ 흔들리는 애니메이션 */
    .hanging-icon {
        width: 200px;
        animation: swing 2s ease-in-out infinite alternate;
        transform-origin: top center;
    }

    @keyframes swing {
        0% { transform: rotate(-8deg); }
        100% { transform: rotate(8deg); }
    }

    .input-box {
        text-align: center;
    }

    input {
        padding: 10px;
        width: 260px;
        font-size: 16px;
        border-radius: 8px;
        border: 1px solid #999;
        margin-top: 10px;
    }

    .result, .total-score {
        margin-top: 15px;
        font-size: 20px;
        font-weight: bold;
    }

    .total-score {
        color: #333;
    }
</style>
</head>
<body>

<div class="cliff-container">
    <!-- ✅ 너가 준 GIF + 흔들림 적용 -->
    <img class="hanging-icon" 
         src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExcWl2aHJ5NWEyYXM2Yjd3ZXFld3FmczF3MDVubGpjY29haWJ4NmkyeCZlcD12MV9naWZzX3NlYXJjaCZjdT1n/lehsxJpCEmZlrqtwUj/giphy.gif" />
</div>

<div class="input-box">
    <div style="font-size: 22px; margin-bottom: 10px;">
        선누에게 뭐라고 말했습니까?
    </div>
    <input type="text" id="userInput" placeholder="입력해주세요" />
    <div class="result" id="resultText"></div>
    <div class="total-score" id="totalScoreText">누적 벌점: 0점</div>
</div>

<script>
let totalScore = 0;

document.getElementById("userInput").addEventListener("input", () => {
    const text = document.getElementById("userInput").value.trim();
    const result = document.getElementById("resultText");
    const scoreDisplay = document.getElementById("totalScoreText");

    let penalty = 0;

    // ✅ 최우선: 뭐요 / 뭐가요
    if (text.includes("뭐요") || text.includes("뭐가요")) {
        penalty = -100000;
        result.textContent = "벌점 -10만점입니다";
        result.style.color = "red";
    }
    // ✅ 두 번째: ㅋ 가 하나라도 있으면
    else if (text.includes("ㅋ")) {
        penalty = -50000;
        result.textContent = "벌점 -5만점입니다";
        result.style.color = "red";
    }
    // ✅ 아무것도 해당 안 될 때
    else {
        result.textContent = "404 ERROR: 선누가 마상을 입었으니 벌점 측정 불가";
        result.style.color = "black";
        return;  // 점수 누적하지 않음
    }

    // ✅ 점수 누적
    totalScore += penalty;

    // ✅ 누적 점수 갱신
    scoreDisplay.textContent = `누적 벌점: ${totalScore}점`;
});
</script>

</body>
</html>
