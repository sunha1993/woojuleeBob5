<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sunha Page</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: #f4f4f4;
        font-family: Arial, sans-serif;
    }

    .cliff-container {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 40px;
        height: 250px;
        width: 250px;
        position: relative;
    }

    .hanging-icon {
        width: 160px;
        animation: swing 2s ease-in-out infinite alternate;
        transform-origin: top center;
    }

    @keyframes swing {
        0% { transform: rotate(-8deg); }
        100% { transform: rotate(8deg); }
    }

    .input-box {
        text-align: center;
    }

    input {
        padding: 10px;
        width: 260px;
        font-size: 16px;
        border-radius: 8px;
        border: 1px solid #999;
        margin-top: 10px;
    }

    .result, .total-score {
        margin-top: 15px;
        font-size: 20px;
        font-weight: bold;
    }

    .total-score {
        color: #333;
    }
</style>
</head>

</div>
